services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ../api
    restart: unless-stopped
    env_file:
      - ./studara-api.env
    ports:
      - "3000:3000"
    depends_on:
      - redis

  worker:
    build:
      context: ../api
    restart: unless-stopped
    env_file:
      - ./studara-api.env
    command: ["node", "dist/worker.js"]
    depends_on:
      - redis
      - api

