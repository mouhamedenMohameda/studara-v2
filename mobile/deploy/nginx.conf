# ─────────────────────────────────────────────────────────────────────────────
# Studara — Nginx reverse proxy
#
# HTTPS est géré automatiquement par certbot (--nginx).
# Lors du premier run:
#   sudo certbot --nginx -d api.radar-mr.com
# certbot modifie ce fichier pour ajouter le bloc `listen 443 ssl` + la
# redirection HTTP→HTTPS, et met en place un renouvellement automatique.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api.radar-mr.com radar-mr.com www.radar-mr.com 5.189.153.144;

    # Gzip compression — réduit la bande passante de ~70% sur les JSON
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # Taille max des uploads (ressources, voice notes, etc.)
    # Garde ce fichier cohérent avec /etc/nginx/conf.d/upload_size.conf sur le
    # serveur (où la vraie limite est appliquée — certbot gère sites-enabled/
    # et on ne veut pas écraser sa config HTTPS).
    client_max_body_size 200M;

    # Admin static assets — served directly (no redirect)
    location ~* ^/admin/assets/ {
        root /var/www/studara;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Admin panel SPA
    location /admin {
        alias /var/www/studara/admin;
        index index.html;
        try_files $uri /admin/index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://localhost:3000/uploads/;
    }

    # Privacy policy page
    location /privacy {
        alias /var/www/studara/privacy;
        index index.html;
        try_files $uri /privacy/index.html;
    }

    # Root redirects to admin
    location = / {
        return 301 /admin/;
    }
}
