#
# Example Nginx vhost for Studara on a single domain:
# - API (Express / PM2) serves /api/v1/* and /health
# - Admin UI (Vite build) served statically at /admin
#
# Paths on VPS used by deploy script:
# - /var/www/studara/api    (backend)
# - /var/www/studara/admin  (admin dist/)
#
# IMPORTANT:
# - Adapt server_name + SSL config to your setup (certbot, etc.).
#

server {
  listen 80;
  server_name api.radar-mr.com;

  # If you use HTTPS, replace this server block with your SSL-enabled one
  # and optionally keep an HTTP->HTTPS redirect here.

  # --- Admin UI (static) ---
  location ^~ /admin/ {
    alias /var/www/studara/admin/;
    try_files $uri $uri/ /admin/index.html;
    add_header Cache-Control "no-cache";
  }

  # Optional: if someone hits /admin without trailing slash
  location = /admin {
    return 301 /admin/;
  }

  # --- API (Express) ---
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://127.0.0.1:3000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

